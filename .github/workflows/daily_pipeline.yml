name: Daily Franchise Content Pipeline

on:
  schedule:
    - cron: "0 14 * * 1-5"  # 10am EST (2pm UTC) Monday-Friday
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python -m pipeline.main

      - name: Commit generated post to repo
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add data/posts/
          git diff --staged --quiet || git commit -m "post: $(date +%Y-%m-%d) daily franchise content"
          git push
